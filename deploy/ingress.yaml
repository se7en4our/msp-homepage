apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: msp-homepage
  namespace: www
  annotations:
    # letsencrypt-staging으로 먼저 검증 완료(2026-07-23) 후 prod로 전환.
    # letsencrypt-prod/letsencrypt-staging 둘 다 DNS-01(cert-manager-webhook-oci)
    # 이라 HTTP 경로/self-check 관련 애노테이션(http01-edit-in-place,
    # ssl-redirect)은 더 이상 필요 없음 - platform/ingress/CLAUDE.md 참고.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["www.daon.cloud", "daon.cloud"]
      secretName: msp-homepage-tls
  rules:
    - host: www.daon.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: msp-homepage
                port:
                  number: 80
    - host: daon.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: msp-homepage
                port:
                  number: 80
