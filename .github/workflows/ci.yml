name: CI
on:
  push:
    branches: [main]
permissions:
  contents: write # 매니페스트 태그 커밋용
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set vars
        id: v
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: yny.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          # 클러스터 노드풀이 ARM(VM.Standard.A1.Flex)이라 arm64로 빌드
          platforms: linux/arm64
          push: true
          build-args: |
            BUILD_SHA=${{ steps.v.outputs.sha }}
            BUILD_TIME=${{ steps.v.outputs.time }}
          tags: yny.ocir.io/axbeonwnkylm/chuncheon-prod/msp-homepage:${{ steps.v.outputs.sha }}
      - name: Bump image tag in manifest (GitOps)
        run: |
          sed -i "s|image: yny.ocir.io/.*|image: yny.ocir.io/axbeonwnkylm/chuncheon-prod/msp-homepage:${{ steps.v.outputs.sha }}|" deploy/deployment.yaml
          git config user.name "ci-bot"
          git config user.email "ci@users.noreply.github.com"
          git commit -am "deploy: ${{ steps.v.outputs.sha }}" || echo "no change"
          git push
